<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World - HT Work</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 h-screen flex flex-col">
    <nav class="bg-blue-600 p-4 text-white flex justify-between items-center shadow-md">
        <div class="text-xl font-bold">HT Work Panel</div>
        <button id="logoutBtn" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded-md font-medium transition">Đăng xuất</button>
    </nav>

    <main class="flex-grow flex items-center justify-center">
        <div class="text-center bg-white p-10 rounded-xl shadow-lg border border-gray-100">
            <h1 class="text-5xl font-extrabold text-gray-800 mb-4">Hello World! 🌍</h1>
            <p class="text-xl text-gray-600">Chào mừng bạn trở lại,</p>
            <p id="userNameDisplay" class="text-2xl font-bold text-blue-600 mt-2">Đang tải...</p>
            
            <div class="mt-8 p-4 bg-green-50 border border-green-200 rounded-md text-green-700">
                ✅ Hệ thống Frontend đã kết nối thành công với Backend và Database Supabase.
            </div>
        </div>
    </main>

    <script>
        // 1. Kiểm tra xem user đã đăng nhập chưa (Kiểm tra LocalStorage)
        const userStr = localStorage.getItem('user');
        
        if (!userStr) {
            // Nếu chưa có dữ liệu, đá văng ra trang login
            alert("Bạn chưa đăng nhập!");
            window.location.href = 'login.html';
        } else {
            // Nếu có, lấy tên ra hiển thị
            const user = JSON.parse(userStr);
            document.getElementById('userNameDisplay').textContent = user.full_name || user.email;
        }

        // 2. Chức năng Đăng xuất
        document.getElementById('logoutBtn').addEventListener('click', () => {
            // Xóa bộ nhớ tạm và quay về trang đăng nhập
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
